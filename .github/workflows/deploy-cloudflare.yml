name: Deploy Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.18

      - name: Install dependencies with Bun
        run: bun install

      # @noble/ciphers 2.x exports ./utils.js but some tooling still imports ./utils.
      - name: Patch @noble/ciphers utils export alias
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");
          const pkgPath = path.join("node_modules", "@noble", "ciphers", "package.json");
          if (!fs.existsSync(pkgPath)) {
            console.log("skip noble patch: package missing");
            process.exit(0);
          }
          const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
          if (pkg.exports && pkg.exports["./utils.js"] && !pkg.exports["./utils"]) {
            pkg.exports["./utils"] = pkg.exports["./utils.js"];
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + "\n");
            console.log("Aliased @noble/ciphers ./utils -> ./utils.js");
          } else {
            console.log("No @noble/ciphers ./utils alias needed");
          }
          NODE

      # fdir pulls Node fs via createRequire; Workers can't use it. Stub before OpenNext bundles.
      - name: Stub fdir for Cloudflare Workers
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");
          const dir = path.join("node_modules", "fdir", "dist");
          fs.mkdirSync(dir, { recursive: true });
          const stub = `export class Builder {
  glob() { return this; }
  withFullPaths() { return this; }
  withRelativePaths() { return this; }
  withPathSeparator() { return this; }
  withErrors() { return this; }
  onlyDirs() { return this; }
  onlyFiles() { return this; }
  filter() { return this; }
  exclude() { return this; }
  concurrency() { return this; }
  crawl() { return this; }
  crawlWithOptions() { return this; }
  sync() { return []; }
  async() { return Promise.resolve([]); }
  withAbort() { return this; }
}
export default Builder;
`;
          fs.writeFileSync(path.join(dir, "index.mjs"), stub);
          fs.writeFileSync(path.join(dir, "index.js"), stub.replace("export class", "class").replace("export default Builder;", "module.exports = { Builder, default: Builder };"));
          console.log("Stubbed fdir for Workers");
          NODE

      - name: Write production env (editor-only placeholders)
        env:
          SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
        run: |
          SITE_URL="${SITE_URL:-https://opencut.workers.dev}"
          printf '%s\n' \
            'NODE_ENV=production' \
            "NEXT_PUBLIC_SITE_URL=${SITE_URL}" \
            'NEXT_PUBLIC_MARBLE_API_URL=https://api.marblecms.com' \
            'DATABASE_URL=postgresql://user:pass@127.0.0.1:5432/opencut' \
            "BETTER_AUTH_SECRET=${AUTH_SECRET}" \
            'UPSTASH_REDIS_REST_URL=https://placeholder.upstash.io' \
            'UPSTASH_REDIS_REST_TOKEN=placeholder_token' \
            'MARBLE_WORKSPACE_KEY=placeholder' \
            'FREESOUND_CLIENT_ID=placeholder' \
            'FREESOUND_API_KEY=placeholder' \
            > apps/web/.env.production

      - name: Deploy to Cloudflare Workers
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NODE_ENV: production
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_MARBLE_API_URL: https://api.marblecms.com
          DATABASE_URL: postgresql://user:pass@127.0.0.1:5432/opencut
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          UPSTASH_REDIS_REST_URL: https://placeholder.upstash.io
          UPSTASH_REDIS_REST_TOKEN: placeholder_token
          MARBLE_WORKSPACE_KEY: placeholder
          FREESOUND_CLIENT_ID: placeholder
          FREESOUND_API_KEY: placeholder
        run: |
          if [ -z "$NEXT_PUBLIC_SITE_URL" ]; then
            export NEXT_PUBLIC_SITE_URL="https://opencut.workers.dev"
          fi
          bun run deploy
