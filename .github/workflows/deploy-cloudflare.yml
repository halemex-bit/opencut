name: Deploy Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.18

      - name: Install dependencies with Bun
        run: bun install

      - name: Patch @noble/ciphers utils export alias
        run: node scripts/patch-noble-ciphers.js

      - name: Write production env (editor-only placeholders)
        env:
          SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
        run: |
          SITE_URL="${SITE_URL:-https://opencut.workers.dev}"
          printf '%s\n' \
            'NODE_ENV=production' \
            "NEXT_PUBLIC_SITE_URL=${SITE_URL}" \
            'NEXT_PUBLIC_MARBLE_API_URL=https://api.marblecms.com' \
            'DATABASE_URL=postgresql://user:pass@127.0.0.1:5432/opencut' \
            "BETTER_AUTH_SECRET=${AUTH_SECRET}" \
            'UPSTASH_REDIS_REST_URL=https://placeholder.upstash.io' \
            'UPSTASH_REDIS_REST_TOKEN=placeholder_token' \
            'MARBLE_WORKSPACE_KEY=placeholder' \
            'FREESOUND_CLIENT_ID=placeholder' \
            'FREESOUND_API_KEY=placeholder' \
            > apps/web/.env.production

      - name: Build Next.js with real plugins
        working-directory: apps/web
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_MARBLE_API_URL: https://api.marblecms.com
          DATABASE_URL: postgresql://user:pass@127.0.0.1:5432/opencut
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          UPSTASH_REDIS_REST_URL: https://placeholder.upstash.io
          UPSTASH_REDIS_REST_TOKEN: placeholder_token
          MARBLE_WORKSPACE_KEY: placeholder
          FREESOUND_CLIENT_ID: placeholder
          FREESOUND_API_KEY: placeholder
        run: |
          if [ -z "$NEXT_PUBLIC_SITE_URL" ]; then
            export NEXT_PUBLIC_SITE_URL="https://opencut.workers.dev"
          fi
          bun run build

      - name: Prepare OpenNext packaging workarounds
        run: |
          node scripts/strip-content-collections-config.js
          node scripts/stub-fdir-for-workers.js
          node -e "const fs=require('fs'); const p='apps/web/package.json'; const j=JSON.parse(fs.readFileSync(p,'utf8')); j.scripts.build='node -e \"process.exit(0)\"'; fs.writeFileSync(p, JSON.stringify(j,null,2)+'\\n');"

      - name: Package with OpenNext and deploy
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NODE_ENV: production
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_MARBLE_API_URL: https://api.marblecms.com
          DATABASE_URL: postgresql://user:pass@127.0.0.1:5432/opencut
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          UPSTASH_REDIS_REST_URL: https://placeholder.upstash.io
          UPSTASH_REDIS_REST_TOKEN: placeholder_token
          MARBLE_WORKSPACE_KEY: placeholder
          FREESOUND_CLIENT_ID: placeholder
          FREESOUND_API_KEY: placeholder
        run: |
          if [ -z "$NEXT_PUBLIC_SITE_URL" ]; then
            export NEXT_PUBLIC_SITE_URL="https://opencut.workers.dev"
          fi
          bunx opennextjs-cloudflare build
          echo "Worker bundle sizes:"
          du -h .open-next/worker.js .open-next/*.js 2>/dev/null || true
          find .open-next -name '*.js' -printf '%s %p\n' 2>/dev/null | sort -nr | head -20
          bunx opennextjs-cloudflare deploy
