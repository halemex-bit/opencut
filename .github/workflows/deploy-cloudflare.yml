name: Deploy Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.18

      - name: Install dependencies with Bun
        run: bun install

      # @noble/ciphers 2.x exports ./utils.js but some tooling still imports ./utils.
      - name: Patch @noble/ciphers utils export alias
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");
          const pkgPath = path.join("node_modules", "@noble", "ciphers", "package.json");
          if (!fs.existsSync(pkgPath)) {
            console.log("skip noble patch: package missing");
            process.exit(0);
          }
          const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
          if (pkg.exports && pkg.exports["./utils.js"] && !pkg.exports["./utils"]) {
            pkg.exports["./utils"] = pkg.exports["./utils.js"];
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + "\n");
            console.log("Aliased @noble/ciphers ./utils -> ./utils.js");
          } else {
            console.log("No @noble/ciphers ./utils alias needed");
          }
          NODE

      # Replace bun-rewritten fdir require shims that break OpenNext/esbuild.
      - name: Patch fdir for OpenNext esbuild
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");
          const roots = ["node_modules"];
          const targets = [];
          function walk(dir) {
            let entries;
            try { entries = fs.readdirSync(dir, { withFileTypes: true }); } catch { return; }
            for (const entry of entries) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                if (entry.name === ".cache" || entry.name === "dist") {
                  // still walk dist
                }
                if (entry.name === "fdir") {
                  const candidate = path.join(full, "dist", "index.mjs");
                  if (fs.existsSync(candidate)) targets.push(candidate);
                }
                if (entry.name === "node_modules" || entry.name === ".bun" || entry.name === "fdir" || !entry.name.startsWith(".")) {
                  walk(full);
                }
              }
            }
          }
          walk("node_modules");
          const broken = /__"([^"]+)"/g;
          let patched = 0;
          for (const file of targets) {
            let source = fs.readFileSync(file, "utf8");
            if (!broken.test(source) && !source.includes('__require("picomatch")') && !source.includes("__require.resolve")) {
              continue;
            }
            broken.lastIndex = 0;
            if (broken.test(source)) {
              broken.lastIndex = 0;
              source = source.replace(broken, '__require("$1")');
              fs.writeFileSync(file, source);
              patched++;
              console.log("patched absolute require:", file);
              continue;
            }
            // Neutralize optional picomatch require so esbuild never rewrites it.
            const next = source.replace(
              /try \{[\s\S]*?pm = __require\(["']picomatch["']\);[\s\S]*?\} catch \{\}/,
              "try { pm = null; } catch {}"
            );
            if (next !== source) {
              fs.writeFileSync(file, next);
              patched++;
              console.log("neutralized picomatch require:", file);
            }
          }
          console.log(`fdir targets=${targets.length} patched=${patched}`);
          NODE

      - name: Write production env (editor-only placeholders)
        env:
          SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
        run: |
          SITE_URL="${SITE_URL:-https://opencut.workers.dev}"
          printf '%s\n' \
            'NODE_ENV=production' \
            "NEXT_PUBLIC_SITE_URL=${SITE_URL}" \
            'NEXT_PUBLIC_MARBLE_API_URL=https://api.marblecms.com' \
            'DATABASE_URL=postgresql://user:pass@127.0.0.1:5432/opencut' \
            "BETTER_AUTH_SECRET=${AUTH_SECRET}" \
            'UPSTASH_REDIS_REST_URL=https://placeholder.upstash.io' \
            'UPSTASH_REDIS_REST_TOKEN=placeholder_token' \
            'MARBLE_WORKSPACE_KEY=placeholder' \
            'FREESOUND_CLIENT_ID=placeholder' \
            'FREESOUND_API_KEY=placeholder' \
            > apps/web/.env.production

      - name: Deploy to Cloudflare Workers
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NODE_ENV: production
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_MARBLE_API_URL: https://api.marblecms.com
          DATABASE_URL: postgresql://user:pass@127.0.0.1:5432/opencut
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          UPSTASH_REDIS_REST_URL: https://placeholder.upstash.io
          UPSTASH_REDIS_REST_TOKEN: placeholder_token
          MARBLE_WORKSPACE_KEY: placeholder
          FREESOUND_CLIENT_ID: placeholder
          FREESOUND_API_KEY: placeholder
        run: |
          if [ -z "$NEXT_PUBLIC_SITE_URL" ]; then
            export NEXT_PUBLIC_SITE_URL="https://opencut.workers.dev"
          fi
          bun run deploy
